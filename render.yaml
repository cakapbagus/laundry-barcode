services:
  - type: web
    name: laundry-barcode
    runtime: node
    rootDir: .
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install && npm run build && npx prisma generate
    startCommand: node backend/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: laundry-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false   # diisi manual: https://<nama-app>.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false   # sama dengan FRONTEND_URL

databases:
  - name: laundry-db
    databaseName: laundry
    user: laundry_user
    plan: free
